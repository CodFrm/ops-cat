<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpsKat Extension Dev Server</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e5e5e5; }
  .header { background: #1a1a1a; border-bottom: 1px solid #333; padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 16px; font-weight: 600; }
  .header .badge { background: #2563eb; color: white; font-size: 11px; padding: 2px 8px; border-radius: 4px; }
  .tabs { display: flex; border-bottom: 1px solid #333; background: #141414; }
  .tab { padding: 10px 20px; cursor: pointer; font-size: 13px; color: #999; border-bottom: 2px solid transparent; }
  .tab.active { color: #e5e5e5; border-bottom-color: #2563eb; }
  .tab:hover { color: #ccc; }
  .panel { display: none; padding: 20px; height: calc(100vh - 90px); overflow-y: auto; }
  .panel.active { display: block; }
  pre { background: #1a1a1a; padding: 12px; border-radius: 6px; font-size: 12px; overflow-x: auto; white-space: pre-wrap; }
  .tool-list { display: flex; flex-direction: column; gap: 8px; margin: 12px 0; }
  .tool-item { background: #1a1a1a; padding: 10px 14px; border-radius: 6px; border: 1px solid #333; }
  .tool-item h4 { font-size: 13px; color: #60a5fa; margin-bottom: 4px; }
  .tool-item p { font-size: 12px; color: #999; }
  h2 { font-size: 15px; margin-bottom: 12px; color: #ccc; }
  h3 { font-size: 13px; margin: 16px 0 8px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 12px; color: #999; margin-bottom: 4px; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 8px 10px; background: #1a1a1a; border: 1px solid #333; border-radius: 4px; color: #e5e5e5; font-size: 13px;
  }
  .form-group textarea { min-height: 120px; font-family: monospace; }
  button { padding: 8px 16px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
  button:hover { background: #1d4ed8; }
  button.secondary { background: #333; }
  button.secondary:hover { background: #444; }
  .result { margin-top: 12px; }
  .log-entry { font-size: 12px; font-family: monospace; padding: 4px 0; border-bottom: 1px solid #1a1a1a; }
  .log-type { display: inline-block; width: 80px; font-weight: 600; }
  .log-type.http { color: #60a5fa; }
  .log-type.kv_get, .log-type.kv_set { color: #34d399; }
  .log-type.log { color: #fbbf24; }
  .log-type.credential_get, .log-type.asset_config { color: #f472b6; }
  .ext-page-container { width: 100%; height: 100%; }
  .flex-row { display: flex; gap: 12px; align-items: flex-start; }
  .flex-1 { flex: 1; }
</style>
</head>
<body>
<div class="header">
  <h1>OpsKat Extension Dev Server</h1>
  <span class="badge" id="ext-badge">loading...</span>
</div>
<div class="tabs">
  <div class="tab active" data-tab="info">Extension Info</div>
  <div class="tab" data-tab="config">Config</div>
  <div class="tab" data-tab="tools">Tool Testing</div>
  <div class="tab" data-tab="page">Extension Page</div>
  <div class="tab" data-tab="logs">Logs</div>
</div>

<div id="panel-info" class="panel active"></div>
<div id="panel-config" class="panel"></div>
<div id="panel-tools" class="panel"></div>
<div id="panel-page" class="panel"></div>
<div id="panel-logs" class="panel"></div>

<script src="/app.js"></script>
</body>
</html>
